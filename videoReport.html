      // --- Build form inputs from COURSES ---
      const grid = document.getElementById("courseGrid");
      COURSES.forEach(({ name, key }) => {
        grid.insertAdjacentHTML(
          "beforeend",
          `
                <div class="video-course-item">
                  <span class="course-name">${name}</span>
                  <input type="number" class="course-input" data-key="${key}" min="0" placeholder="0" />
                </div>
              `,
        );
      });

      // Set today's date as default
      document.getElementById("reportDate").valueAsDate = new Date();

      // --- Helpers ---
      function showPage(pageId) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
      }

      function getInputValues() {
        return COURSES.map(({ name, key }) => ({
          name,
          count:
            parseInt(document.querySelector(`[data-key="${key}"]`).value) || 0,
        }));
      }

      function clearInputs() {
        document
          .querySelectorAll(".course-input")
          .forEach((input) => (input.value = 0));
      }

      // --- Actions ---
      function generateReport() {
        const date = document.getElementById("reportDate").value;
        if (!date) {
          alert("Please select a date!");
          return;
        }

        document.getElementById("reportDateDisplay").textContent = new Date(
          date,
        ).toLocaleDateString("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });

        const entries = getInputValues().filter((e) => e.count > 0);
        const total = entries.reduce((sum, e) => sum + e.count, 0);

        const rows = entries.length
          ? entries
              .map(
                ({ name, count }) => `
                    <div class="report-course">
                      <span class="report-course-name">${name}</span>
                      <span class="report-course-count">${count}</span>
                    </div>`,
              )
              .join("")
          : '<div class="no-data">No video uploads recorded for this date.</div>';

        document.getElementById("reportContent").innerHTML = `
                ${rows}
                <div class="total-section">
                  <div class="total-title">Total Video Uploads</div>
                  <div class="total-count">${total}</div>
                </div>
              `;

        showPage("reportPage");
      }

      function resetForm() {
        if (confirm("Are you sure you want to reset all data?")) clearInputs();
      }

      function resetAndBack() {
        if (
          confirm(
            "Are you sure you want to reset all data and create a new report?",
          )
        ) {
          clearInputs();
          showPage("inputPage");
        }
